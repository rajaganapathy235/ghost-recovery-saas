version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: ghost-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ghost_secure_password}
      POSTGRES_DB: ${DB_NAME:-ghost_recovery}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ghost-network
    deploy:
      resources:
        limits:
          memory: 1G # Optimized for 2GB RAM VPS

  redis:
    image: redis:7-alpine
    container_name: ghost-redis
    restart: always
    command: redis-server --appendonly yes
    networks:
      - ghost-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ghost-app
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-ghost_secure_password}@db:5432/${DB_NAME:-ghost_recovery}?schema=public
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    depends_on:
      - db
      - redis
    networks:
      - ghost-network

  nginx:
    image: nginx:alpine
    container_name: ghost-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app
    networks:
      - ghost-network

networks:
  ghost-network:
    driver: bridge

volumes:
  postgres_data:
